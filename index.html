<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DiabetesAI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="navbar">

        <div class="logo">
            DiabetesAI
        </div>

        <div class="status">
            ● AI Live
        </div>

    </div>

    <div class="container">

        <!-- LEFT PANEL -->

        <div class="card">

            <h2>Patient Biomarkers</h2>

            <form action="/predict" method="POST">

               <input type="text"
                     name="patient_name"
                    placeholder="Patient Name"
                    required>

                <select name="gender">

                 <option value="Male">Male</option>

                 <option value="Female">Female</option>

                </select>

                <input type="number"
                     name="pregnancies"
                    placeholder="Pregnancies"
                    required>

                 <input type="number"
                    name="glucose"
                    placeholder="Glucose"
                    required>

                <input type="number"
                     name="blood_pressure"
                     placeholder="Blood Pressure"
                     required>

                 <input type="number"
                     name="skin_thickness"
                      placeholder="Skin Thickness"
                        required>

                <input type="number"
                      name="insulin"
                      placeholder="Insulin"
                      required>

                <input type="number"
                      step="0.1"
                      name="bmi"
                      placeholder="BMI"
                      required>

                  <input type="number"
                     step="0.001"
                     name="dpf"
                     placeholder="Diabetes Pedigree Function"
                     required>

                <input type="number"
                     name="age"
                     placeholder="Age"
                     required>

                 <button type="submit">
                 Analyze Risk
                 </button>

            </form>
        </div>

        <!-- RIGHT PANEL -->

        <div class="card">

            <h2>Risk Overview</h2>

            <div class="gauge">

                <div class="circle">
                    0%
                </div>

            </div>

            <div class="risk">

                Waiting For Analysis

            </div>

            <div class="bars">

                <div class="bar low"></div>

                <div class="bar moderate"></div>

                <div class="bar high"></div>

            </div>

        </div>

    </div>

</body>
</html>
